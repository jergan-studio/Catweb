<!DOCTYPE html>
<html>
<head>
  <title>CatWeb Block JSON Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #left {
      width: 35%;
      background: #f2f2f2;
      padding: 10px;
      overflow: auto;
    }

    #right {
      width: 65%;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 8px;
      background: #4e9bff;
      color: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 300px;
    }

    .block {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!-- LEFT -->
<div id="left">
  <h2>🐱 CatWeb Blocks</h2>

  <button onclick="addButton()">+ Button + Label System</button>
  <button onclick="addRNG()">+ RNG Logic Block</button>
  <button onclick="addText()">+ Text Block</button>

  <button onclick="generate()">EXPORT JSON</button>

  <div id="blocks"></div>
</div>

<!-- RIGHT -->
<div id="right">
  <h2>📦 CatWeb JSON Output</h2>
  <textarea id="out"></textarea>
</div>

<script>

let ui = [];
let scripts = [];

/* ---------------- HELPERS ---------------- */

function id() {
  return Math.random().toString(36).slice(2,6);
}

/* ---------------- BLOCK 1: UI SYSTEM ---------------- */

function addButton() {
  let btnId = "btn_" + id();
  let lblId = "lbl_" + id();

  ui.push({
    globalid: btnId,
    class: "TextButton",
    text: "ROLL",
    background_color: "#4e9bff",
    position: "{0.2,0},{0.5,0}",
    size: "{0.3,0},{0.2,0}"
  });

  ui.push({
    globalid: lblId,
    class: "TextLabel",
    text: "0",
    position: "{0.2,0},{0.2,0}",
    size: "{0.4,0},{0.1,0}"
  });

  scripts.push(makeRNGScript(btnId, lblId));
}

/* ---------------- BLOCK 2: RNG SCRIPT BLOCK ---------------- */

function makeRNGScript(buttonId, labelId) {
  return {
    class: "script",
    content: [
      {
        id: "0",
        globalid: "load",
        text: ["When website loaded..."],
        actions: [
          {
            id: "11",
            text: ["Set", {value:"RN",l:"variable",t:"string"}, "to", {value:"0",l:"any",t:"string"}]
          }
        ],
        width: "350"
      },

      {
        id: "1",
        globalid: "click",
        text: [
          "When",
          {value: buttonId, t:"object", l:"button"},
          "pressed..."
        ],
        actions: [
          {
            id: "27",
            text: [
              "Set",
              {value:"RN",l:"variable",t:"string"},
              "to random",
              {value:"1",t:"number"},
              "-",
              {value:"10",t:"number"}
            ]
          },
          {
            id: "10",
            text: [
              "Set",
              {value: labelId, t:"object"},
              "text to",
              {value:"{RN}",l:"var",t:"string"}
            ]
          }
        ],
        width: "350"
      }
    ]
  };
}

/* ---------------- BLOCK 3: TEXT ---------------- */

function addText() {
  ui.push({
    globalid: "txt_" + id(),
    class: "TextLabel",
    text: "Hello CatWeb",
    position: "{0.3,0},{0.3,0}",
    size: "{0.4,0},{0.1,0}"
  });
}

/* ---------------- EXPORT ---------------- */

function generate() {

  let json = {
    favicon: "1847190174",
    background: "#ffffff",
    webcontent: [
      ...scripts,
      ...ui
    ]
  };

  document.getElementById("out").value =
    JSON.stringify(json, null, 2);
}

</script>

</body>
</html>
