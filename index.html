<!DOCTYPE html>
<html>
<head>
  <title>CatWeb Block Builder FIXED</title>
  <style>
    body { font-family: Arial; display:flex; height:100vh; margin:0; }
    #left { width:40%; background:#f2f2f2; padding:10px; overflow:auto; }
    #right { width:60%; padding:10px; }
    button { width:100%; margin:5px 0; padding:10px; background:#4e9bff; color:white; border:none; border-radius:8px; }
    textarea { width:100%; height:250px; }
    .block { background:white; padding:8px; margin:5px 0; border-radius:6px; }
  </style>
</head>
<body>

<div id="left">
  <h3>🐱 CatWeb Blocks</h3>

  <button onclick="addButton()">Button</button>
  <button onclick="addLabel()">Label</button>
  <button onclick="addRNG()">RNG Script</button>

  <button onclick="build()">EXPORT VALID JSON</button>

  <div id="list"></div>
</div>

<div id="right">
  <h3>📦 Output</h3>
  <textarea id="out"></textarea>
</div>

<script>
let objects = [];

function id() {
  return Math.random().toString(36).substring(2,6);
}

/* ---------------- UI BLOCKS ---------------- */

function addButton() {
  let bid = "b" + id();
  let lid = "l" + id();

  objects.push({
    globalid: bid,
    class: "TextButton",
    text: "ROLL",
    background_color: "#4e9bff",
    position: "{0.2,0},{0.5,0}",
    size: "{0.3,0},{0.2,0}"
  });

  objects.push({
    globalid: lid,
    class: "TextLabel",
    text: "0",
    position: "{0.2,0},{0.2,0}",
    size: "{0.4,0},{0.1,0}"
  });
}

/* ---------------- SCRIPT (VALID STRUCTURE) ---------------- */

function addRNG() {
  let script = {
    class: "script",
    content: [
      {
        id: "0",
        globalid: "load",
        text: ["When website loaded..."],
        actions: [
          {
            id: "11",
            text: ["Set", {value:"RN",l:"variable",t:"string"},"to", {value:"0",l:"any",t:"string"}]
          }
        ],
        width: "350"
      },

      {
        id: "1",
        globalid: "click",
        text: ["When", {value:"btn",t:"object",l:"button"},"pressed..."],
        actions: [
          {
            id: "27",
            text: [
              "Set",
              {value:"RN",l:"variable",t:"string"},
              "to random",
              {value:"1",l:"n",t:"number"},
              "-",
              {value:"10",l:"n",t:"number"}
            ]
          },
          {
            id: "10",
            text: [
              "Set",
              {value:"label",t:"object"},
              "text to",
              {value:"{RN}",l:"var",t:"string"}
            ]
          }
        ],
        width: "350"
      }
    ]
  };

  objects.push(script);
}

/* ---------------- EXPORT (VALID WRAPPER) ---------------- */

function build() {

  let json = {
    favicon: "1847190174",
    background: "#ffffff",
    webcontent: objects
  };

  document.getElementById("out").value =
    JSON.stringify(json, null, 2);
}
</script>

</body>
</html>
