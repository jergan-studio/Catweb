<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CatWeb JSON Builder</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e1e;
  color: white;
}

#topbar {
  padding: 10px;
  background: #2b2b2b;
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  background: #4e9bff;
  color: white;
  border-radius: 6px;
}

#workspace {
  display: flex;
  height: calc(100vh - 50px);
}

#panel {
  width: 300px;
  background: #2a2a2a;
  padding: 10px;
}

#canvas {
  flex: 1;
  background: #111;
  position: relative;
}

.block {
  padding: 8px;
  background: #3a3a3a;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 5px;
}

.ui {
  position: absolute;
  padding: 10px;
  border-radius: 6px;
}

</style>
</head>
<body>

<div id="topbar">
  <button onclick="addButton()">Add Button</button>
  <button onclick="addLabel()">Add Label</button>
  <button onclick="generateJSON()">Export JSON</button>
</div>

<div id="workspace">
  <div id="panel">
    <h3>Blocks</h3>
    <div id="list"></div>
  </div>

  <div id="canvas"></div>
</div>

<script>
let objects = [];
let scripts = [];

function id() {
  return Math.random().toString(36).substring(2,7);
}

function addButton() {
  const gid = id();

  const btn = {
    class: "TextButton",
    globalid: gid,
    text: "Button",
    background_color: "#4e9bff",
    position: "{0.2,0},{0.5,0}",
    size: "{0.2,0},{0.1,0}"
  };

  objects.push(btn);
  drawUI();
}

function addLabel() {
  const gid = id();

  const lbl = {
    class: "TextLabel",
    globalid: gid,
    text: "Label",
    position: "{0.2,0},{0.2,0}",
    size: "{0.3,0},{0.1,0}"
  };

  objects.push(lbl);
  drawUI();
}

function drawUI() {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  objects.forEach(obj => {
    const el = document.createElement("div");
    el.className = "ui";
    el.innerText = obj.text;
    el.style.background = obj.background_color || "#333";

    el.style.left = "100px";
    el.style.top = "100px";

    canvas.appendChild(el);
  });

  document.getElementById("list").innerHTML =
    objects.map(o => `<div class="block">${o.class} - ${o.globalid}</div>`).join("");
}

function generateJSON() {

  const script = {
    class: "script",
    globalid: "script_main",
    content: [
      {
        id: "0",
        x: "4000",
        y: "4600",
        globalid: "load_event",
        text: ["When website loaded..."],
        actions: [
          {
            id: "1",
            text: [
              "Log",
              { value: "Loaded CatWeb", t: "string" }
            ]
          }
        ]
      }
    ]
  };

  const json = {
    favicon: "1847190174",
    background: "#ffffff",
    webcontent: [
      script,
      ...objects
    ]
  };

  console.log(JSON.stringify(json, null, 2));
  alert("JSON exported to console!");
}

drawUI();
</script>

</body>
</html>
