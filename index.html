<!DOCTYPE html>
<html>
<head>
  <title>CatWeb Custom Blocks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #left {
      width: 35%;
      background: #f2f2f2;
      padding: 10px;
      overflow: auto;
    }

    #right {
      width: 65%;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 8px;
      background: #4e9bff;
      color: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 300px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .block {
      background: white;
      padding: 6px;
      margin: 5px 0;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<!-- LEFT -->
<div id="left">
  <h3>🐱 Blocks</h3>

  <button onclick="addUI()">+ Button System</button>
  <button onclick="addText()">+ Text</button>

  <h4>⚙️ Custom Script Block</h4>

  <input id="cb_name" placeholder="Block name (e.g. Set Cookie)">
  <input id="cb_type" placeholder="action type (e.g. cookie_set)">
  <button onclick="addCustomBlock()">Add Custom Block</button>

  <button onclick="addRNG()">+ RNG Script</button>
  <button onclick="exportJSON()">EXPORT JSON</button>

  <div id="list"></div>
</div>

<!-- RIGHT -->
<div id="right">
  <h3>📦 Output</h3>
  <textarea id="out"></textarea>
</div>

<script>

let ui = [];
let scripts = [];
let customBlocks = [];

/* ---------------- ID ---------------- */

function id() {
  return Math.random().toString(36).slice(2,6);
}

/* ---------------- UI BLOCK ---------------- */

function addUI() {
  let btn = "btn_" + id();
  let lbl = "lbl_" + id();

  ui.push({
    globalid: btn,
    class: "TextButton",
    text: "ROLL",
    background_color: "#4e9bff"
  });

  ui.push({
    globalid: lbl,
    class: "TextLabel",
    text: "0"
  });

  scripts.push(makeRNG(btn, lbl));
}

/* ---------------- TEXT ---------------- */

function addText() {
  ui.push({
    globalid: "txt_" + id(),
    class: "TextLabel",
    text: "Hello CatWeb"
  });
}

/* ---------------- CUSTOM BLOCK SYSTEM ---------------- */

function addCustomBlock() {
  let name = document.getElementById("cb_name").value;
  let type = document.getElementById("cb_type").value;

  if (!name || !type) return;

  customBlocks.push({
    name: name,
    type: type
  });

  alert("Custom block added: " + name);
}

/* ---------------- RNG SCRIPT ---------------- */

function makeRNG(btn, lbl) {
  return {
    class: "script",
    content: [
      {
        id: "1",
        text: ["When", {value:btn,t:"object",l:"button"}, "pressed..."],
        actions: [
          {
            id: "rand",
            type: "set_variable",
            text: [
              "Set",
              {value:"RN",l:"variable",t:"string"},
              "to random",
              {value:"1",t:"number"},
              "-",
              {value:"10",t:"number"}
            ]
          },

          // CUSTOM BLOCK INSERTION
          ...customBlocks.map(cb => ({
            id: cb.type,
            type: cb.type,
            text: ["Run custom block:", cb.name]
          })),

          {
            id: "set_ui",
            text: [
              "Set",
              {value:lbl,t:"object"},
              "text to",
              {value:"{RN}",l:"var",t:"string"}
            ]
          }
        ]
      }
    ]
  };
}

/* ---------------- EXPORT ---------------- */

function exportJSON() {

  let json = {
    favicon: "1847190174",
    background: "#ffffff",
    webcontent: [
      ...scripts,
      ...ui
    ]
  };

  document.getElementById("out").value =
    JSON.stringify(json, null, 2);
}

</script>

</body>
</html>
