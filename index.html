<!DOCTYPE html>
<html>
<head>
  <title>CatWeb Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 300px;
    }

    h1 {
      margin: 0 0 10px 0;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #4e9bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2f7fe0;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🐱 CatWeb Portal</h1>
    <p>Click below to enter the real CatWeb experience</p>

    <button onclick="go()">Enter CatWeb</button>
  </div>

  <script>
    function go() {
      window.location.href = "https://www.roblox.com/games/16855862021/CatWeb-Make-a-Website";
    }
  </script>
</body>
</html>
