<!DOCTYPE html>
<html>
<head>
  <title>CatWeb HTML Blocks</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #left {
      width: 40%;
      background: #f2f2f2;
      padding: 10px;
      overflow: auto;
    }

    #right {
      width: 60%;
      padding: 10px;
    }

    button {
      display: block;
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #4e9bff;
      color: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 250px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #ccc;
    }

    .block {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="left">
  <h2>🐱 HTML Blocks</h2>

  <button onclick="add('div')">+ DIV</button>
  <button onclick="add('button')">+ BUTTON</button>
  <button onclick="add('text')">+ TEXT</button>
  <button onclick="add('input')">+ INPUT</button>
  <button onclick="add('script')">+ SCRIPT</button>

  <button onclick="exportJSON()">EXPORT JSON</button>

  <div id="list"></div>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <h2>📦 CatWeb JSON</h2>
  <textarea id="out"></textarea>

  <h2>👀 Preview</h2>
  <iframe id="preview"></iframe>
</div>

<script>
let blocks = [];

function add(type) {
  let id = "id_" + Math.random().toString(36).slice(2);

  let block = {
    globalid: id,
    type: type
  };

  if (type === "div") {
    block.class = "Frame";
    block.text = "Div Box";
  }

  if (type === "button") {
    block.class = "TextButton";
    block.text = "Button";
    block.background_color = "#4e9bff";
  }

  if (type === "text") {
    block.class = "TextLabel";
    block.text = "Hello Text";
  }

  if (type === "input") {
    block.class = "TextBox";
    block.placeholder = "Input...";
  }

  if (type === "script") {
    block.class = "script";
    block.content = [
      {
        text: ["When website loaded..."],
        actions: [
          { text: ["Log", "Hello CatWeb HTML Blocks"] }
        ]
      }
    ];
  }

  blocks.push(block);
  render();
}

function exportJSON() {
  let json = {
    favicon: "1847190174",
    background: "#ffffff",
    webcontent: blocks
  };

  document.getElementById("out").value =
    JSON.stringify(json, null, 2);

  preview(json);
}

function preview(json) {
  let html = "<body style='font-family:Arial;padding:10px'>";

  for (let b of json.webcontent) {
    if (b.class === "TextButton") {
      html += `<button style="background:${b.background_color}">${b.text}</button><br>`;
    }

    if (b.class === "TextLabel") {
      html += `<div>${b.text}</div>`;
    }

    if (b.class === "TextBox") {
      html += `<input placeholder="${b.placeholder}"><br>`;
    }

    if (b.class === "Frame") {
      html += `<div style="padding:10px;border:1px solid #ccc;margin:5px">${b.text}</div>`;
    }
  }

  html += "</body>";

  document.getElementById("preview").srcdoc = html;
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  blocks.forEach(b => {
    let d = document.createElement("div");
    d.className = "block";
    d.innerText = b.class + " | " + (b.text || b.type);
    list.appendChild(d);
  });
}
</script>

</body>
</html>
